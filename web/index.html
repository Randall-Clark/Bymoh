<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Bymoh</title>
    <meta name="description" content="Le marché local dans votre poche" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        width: 100%;
        height: 100%;
        background-color: #E84B1A;
      }

      #splash {
        position: fixed;
        inset: 0;
        background-color: #E84B1A;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }

      #splash img {
        width: 200px;
        height: auto;
        animation: pulse 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.8; transform: scale(0.95); }
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Splash affiché pendant la compilation/chargement -->
    <div id="splash">
      <img src="/assets/images/bymoh-logo.png" alt="Bymoh" />
    </div>

    <div id="root"></div>

    <script>
      // Masque le splash une fois l'app React montée
      window.__hideSplash = function() {
        var el = document.getElementById('splash');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function() { el.remove(); }, 450);
        }
      };
    </script>
  </body>
</html>
